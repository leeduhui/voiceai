<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VoiceAI">
<title>VoiceAI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #ffffff12;
    --accent: #7c6dfa;
    --accent2: #fa6d8a;
    --accent3: #6dfacc;
    --text: #f0f0ff;
    --text2: #8888aa;
    --text3: #444466;
    --red: #ff4466;
    --green: #44ffaa;
    --radius: 20px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    padding: 16px 20px 0;
    gap: 4px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    color: var(--text3);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── SCREENS ── */
  .screen { display: none; padding: 24px 20px; }
  .screen.active { display: block; }

  /* ── RECORD SCREEN ── */
  .rec-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }
  .rec-title { font-size: 22px; font-weight: 800; letter-spacing: -.02em; }
  .rec-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }

  .waveform-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    height: 120px;
    overflow: hidden;
    position: relative;
    margin-bottom: 24px;
  }
  #waveCanvas { width: 100%; height: 100%; }

  .timer-row {
    display: flex;
    justify-content: center;
    margin-bottom: 32px;
  }
  .timer {
    font-family: 'DM Mono', monospace;
    font-size: 52px;
    font-weight: 300;
    letter-spacing: -.02em;
    color: var(--text);
  }
  .timer.recording { color: var(--red); }

  .btn-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    margin-bottom: 32px;
  }
  .btn-secondary {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .btn-secondary:active { transform: scale(.93); background: var(--surface); }

  .btn-record {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 0 rgba(124,109,250,.4);
    transition: all .15s;
    position: relative;
  }
  .btn-record.recording {
    background: var(--red);
    animation: pulse 1.5s infinite;
  }
  .btn-record .rec-icon {
    width: 28px; height: 28px;
    background: white;
    border-radius: 50%;
    transition: border-radius .2s;
  }
  .btn-record.recording .rec-icon { border-radius: 6px; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,68,102,.4); }
    50% { box-shadow: 0 0 0 16px rgba(255,68,102,0); }
  }

  .status-tag {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .status-tag.active { color: var(--red); }

  /* quick settings */
  .quick-settings {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .qs-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text2); margin-bottom: 4px; }
  .qs-row { display: flex; justify-content: space-between; align-items: center; }
  .qs-label { font-size: 14px; font-weight: 500; }
  .qs-sub { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
  .toggle {
    width: 48px; height: 28px;
    background: var(--surface2);
    border-radius: 14px;
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: background .2s;
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    background: white;
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: left .2s;
  }
  .toggle.on::after { left: 22px; }

  /* ── PROCESSING OVERLAY ── */
  .processing-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,15,.9);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    backdrop-filter: blur(12px);
  }
  .processing-overlay.show { display: flex; }
  .spinner {
    width: 56px; height: 56px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .proc-label { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text2); }
  .proc-step { font-size: 18px; font-weight: 700; color: var(--accent); }

  /* ── LIST SCREEN ── */
  .search-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px 12px 40px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; }

  .recording-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .recording-card:active { transform: scale(.98); border-color: var(--accent); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-title { font-size: 16px; font-weight: 700; flex: 1; margin-right: 8px; }
  .card-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); white-space: nowrap; }
  .card-summary { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .04em;
  }
  .tag-duration { background: rgba(124,109,250,.15); color: var(--accent); }
  .tag-speakers { background: rgba(109,250,204,.15); color: var(--accent3); }
  .tag-processing { background: rgba(250,109,138,.15); color: var(--accent2); }

  .empty-state {
    text-align: center;
    padding: 64px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-label { font-size: 16px; font-weight: 600; }
  .empty-sub { font-size: 13px; margin-top: 6px; }

  /* ── DETAIL SCREEN ── */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 20px;
    padding: 0;
  }
  .detail-title { font-size: 26px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 6px; }
  .detail-meta { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); margin-bottom: 20px; }

  .detail-audio {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .play-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform .1s;
  }
  .play-btn:active { transform: scale(.9); }
  .audio-progress {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  .audio-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width .1s; }
  .audio-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); flex-shrink: 0; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 10px;
  }

  .summary-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 0 14px 14px 0;
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 20px;
  }

  .transcript-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 20px;
    max-height: 400px;
    overflow-y: auto;
  }
  .speaker-block { margin-bottom: 14px; }
  .speaker-name {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .speaker-1 { color: var(--accent); }
  .speaker-2 { color: var(--accent2); }
  .speaker-3 { color: var(--accent3); }
  .speaker-4 { color: #facc6d; }
  .speaker-text { font-size: 14px; line-height: 1.6; color: var(--text); }

  .keywords-wrap { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .keyword {
    padding: 6px 14px;
    background: rgba(124,109,250,.12);
    border: 1px solid rgba(124,109,250,.25);
    border-radius: 20px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }

  .share-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
    margin-bottom: 12px;
  }
  .share-btn:active { opacity: .8; }
  .delete-btn {
    width: 100%;
    padding: 16px;
    background: rgba(255,68,102,.1);
    border: 1px solid rgba(255,68,102,.2);
    border-radius: 14px;
    color: var(--red);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
    margin-bottom: 24px;
  }
  .delete-btn:active { opacity: .8; }

  /* ── SETTINGS SCREEN ── */
  .settings-section { margin-bottom: 28px; }
  .settings-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 10px;
    padding-left: 4px;
  }
  .settings-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .settings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row-label { font-size: 15px; font-weight: 500; }
  .settings-row-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .settings-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    width: 180px;
    outline: none;
  }
  .select-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    outline: none;
  }
  .version-note { text-align: center; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); padding: 12px; }

  /* toast */
  .toast {
    position: fixed;
    bottom: calc(80px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    z-index: 1000;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  audio { display: none; }
</style>
</head>
<body>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('record')">● REC</button>
  <button class="tab" onclick="switchTab('list')">목록</button>
  <button class="tab" onclick="switchTab('settings')">설정</button>
</div>

<!-- ═══ RECORD SCREEN ═══ -->
<div class="screen active" id="screen-record">
  <div class="rec-header">
    <div class="rec-title">VoiceAI</div>
    <div class="rec-date" id="recDate"></div>
  </div>

  <div class="waveform-wrap">
    <canvas id="waveCanvas"></canvas>
  </div>

  <div class="timer-row">
    <div class="timer" id="timer">00:00</div>
  </div>

  <div class="status-tag" id="statusTag">탭하여 녹음 시작</div>

  <div class="btn-row">
    <button class="btn-secondary" id="pauseBtn" onclick="togglePause()" style="display:none" title="일시정지">⏸</button>
    <button class="btn-record" id="recBtn" onclick="toggleRecord()">
      <div class="rec-icon"></div>
    </button>
    <button class="btn-secondary" id="stopBtn" onclick="stopAndProcess()" style="display:none" title="중지 및 분석">⏹</button>
  </div>

  <div class="quick-settings">
    <div class="qs-title">녹음 설정</div>
    <div class="qs-row">
      <div>
        <div class="qs-label">화자 분리</div>
        <div class="qs-sub">누가 말했는지 구분</div>
      </div>
      <div class="toggle on" id="toggleDiarize" onclick="toggleSetting('diarize')"></div>
    </div>
    <div class="qs-row">
      <div>
        <div class="qs-label">자동 요약</div>
        <div class="qs-sub">Gemini AI 요약</div>
      </div>
      <div class="toggle on" id="toggleSummary" onclick="toggleSetting('summary')"></div>
    </div>
    <div class="qs-row">
      <div>
        <div class="qs-label">키워드 추출</div>
        <div class="qs-sub">주요 키워드 태깅</div>
      </div>
      <div class="toggle on" id="toggleKeywords" onclick="toggleSetting('keywords')"></div>
    </div>
  </div>
</div>

<!-- ═══ LIST SCREEN ═══ -->
<div class="screen" id="screen-list">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="제목, 내용, 키워드 검색..." oninput="renderList()">
  </div>
  <div id="recordingList"></div>
</div>

<!-- ═══ DETAIL SCREEN ═══ -->
<div class="screen" id="screen-detail">
  <button class="back-btn" onclick="backToList()">← 목록</button>
  <div class="detail-title" id="detailTitle"></div>
  <div class="detail-meta" id="detailMeta"></div>

  <div class="detail-audio">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
    <div class="audio-progress" id="audioProgress" onclick="seekAudio(event)">
      <div class="audio-fill" id="audioFill"></div>
    </div>
    <div class="audio-time" id="audioTime">0:00</div>
  </div>
  <audio id="audioPlayer" onended="onAudioEnded()" ontimeupdate="onAudioProgress()"></audio>

  <div id="detailSummaryWrap">
    <div class="section-label">AI 요약</div>
    <div class="summary-box" id="detailSummary"></div>
  </div>

  <div id="detailKeywordsWrap">
    <div class="section-label">키워드</div>
    <div class="keywords-wrap" id="detailKeywords"></div>
  </div>

  <div class="section-label">대화 내용</div>
  <div class="transcript-box" id="detailTranscript"></div>

  <button class="share-btn" onclick="shareRecording()">📤 공유</button>
  <button class="delete-btn" onclick="deleteRecording()">삭제</button>
</div>

<!-- ═══ SETTINGS SCREEN ═══ -->
<div class="screen" id="screen-settings">
  <div class="settings-section">
    <div class="settings-section-title">Gemini API</div>
    <div class="settings-card">
      <div class="settings-row">
        <div>
          <div class="settings-row-label">API Key</div>
          <div class="settings-row-sub">Google AI Studio에서 발급</div>
        </div>
        <input class="settings-input" id="apiKeyInput" type="password" placeholder="AIza..." oninput="saveSettings()">
      </div>
      <div class="settings-row">
        <div>
          <div class="settings-row-label">모델</div>
        </div>
        <select class="select-input" id="modelSelect" onchange="saveSettings()">
          <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
          <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
          <option value="gemini-3.1-pro-previwe">Gemini 3.1 Pro Preview</option>
        </select>
      </div>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">언어</div>
    <div class="settings-card">
      <div class="settings-row">
        <div class="settings-row-label">녹음 언어</div>
        <select class="select-input" id="langSelect" onchange="saveSettings()">
          <option value="ko">한국어</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="zh">中文</option>
        </select>
      </div>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">저장</div>
    <div class="settings-card">
      <div class="settings-row">
        <div>
          <div class="settings-row-label">녹음 수</div>
          <div class="settings-row-sub" id="storageInfo"></div>
        </div>
      </div>
      <div class="settings-row">
        <div class="settings-row-label" style="color:var(--red)">모든 녹음 삭제</div>
        <button class="btn-secondary" onclick="clearAll()" style="width:auto;padding:8px 14px;border-radius:8px;font-size:13px;">삭제</button>
      </div>
    </div>
  </div>

  <div class="version-note">VoiceAI v1.0 · Powered by Gemini</div>
</div>

<!-- Processing Overlay -->
<div class="processing-overlay" id="procOverlay">
  <div class="spinner"></div>
  <div class="proc-step" id="procStep">분석 중...</div>
  <div class="proc-label" id="procLabel">잠시만 기다려주세요</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let recordings = JSON.parse(localStorage.getItem('voiceai_recordings') || '[]');
let settings = JSON.parse(localStorage.getItem('voiceai_settings') || JSON.stringify({
  apiKey: 'AIzaSyAjivAaq_Vi3lk1W-u2J4LZ5zzOASUeWMs',
  model: 'gemini-3.1-pro-preview',
  lang: 'ko',
  diarize: true,
  summary: true,
  keywords: true
}));

let mediaRecorder = null;
let audioChunks = [];
let recordingStartTime = null;
let timerInterval = null;
let isPaused = false;
let pauseStart = null;
let totalPausedMs = 0;
let animFrameId = null;
let analyser = null;
let currentDetailId = null;
let audioCtx = null;
let stream = null;

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
function init() {
  // Set date
  const now = new Date();
  document.getElementById('recDate').textContent = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });

  // Load settings
  document.getElementById('apiKeyInput').value = settings.apiKey || '';
  document.getElementById('modelSelect').value = settings.model || 'gemini-1.5-pro';
  document.getElementById('langSelect').value = settings.lang || 'ko';
  syncToggle('diarize');
  syncToggle('summary');
  syncToggle('keywords');

  updateStorageInfo();
  renderList();
  drawIdleWave();
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'list') renderList();
  if (name === 'settings') updateStorageInfo();
}

// ═══════════════════════════════════════════
// RECORDING
// ═══════════════════════════════════════════
async function toggleRecord() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') {
    await startRecording();
  } else {
    stopAndProcess();
  }
}

async function startRecording() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);

    const mimeType = getSupportedMimeType();
    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.start(100);

    recordingStartTime = Date.now();
    totalPausedMs = 0;
    isPaused = false;

    document.getElementById('recBtn').classList.add('recording');
    document.getElementById('timer').classList.add('recording');
    document.getElementById('pauseBtn').style.display = 'flex';
    document.getElementById('stopBtn').style.display = 'flex';
    document.getElementById('statusTag').textContent = '녹음 중...';
    document.getElementById('statusTag').classList.add('active');

    timerInterval = setInterval(updateTimer, 500);
    drawLiveWave();
  } catch (err) {
    showToast('마이크 권한이 필요합니다');
  }
}

function getSupportedMimeType() {
  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
  for (const t of types) { if (MediaRecorder.isTypeSupported(t)) return t; }
  return null;
}

function togglePause() {
  if (!mediaRecorder) return;
  if (mediaRecorder.state === 'recording') {
    mediaRecorder.pause();
    isPaused = true;
    pauseStart = Date.now();
    document.getElementById('pauseBtn').textContent = '▶';
    document.getElementById('statusTag').textContent = '일시정지';
    document.getElementById('statusTag').classList.remove('active');
    cancelAnimationFrame(animFrameId);
    drawIdleWave();
  } else if (mediaRecorder.state === 'paused') {
    mediaRecorder.resume();
    isPaused = false;
    totalPausedMs += Date.now() - pauseStart;
    document.getElementById('pauseBtn').textContent = '⏸';
    document.getElementById('statusTag').textContent = '녹음 중...';
    document.getElementById('statusTag').classList.add('active');
    drawLiveWave();
  }
}

async function stopAndProcess() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') return;

  const duration = Math.floor((Date.now() - recordingStartTime - totalPausedMs) / 1000);

  mediaRecorder.stop();
  stream.getTracks().forEach(t => t.stop());
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrameId);

  document.getElementById('recBtn').classList.remove('recording');
  document.getElementById('timer').classList.remove('recording');
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('pauseBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('statusTag').textContent = '분석 중...';
  document.getElementById('statusTag').classList.remove('active');
  drawIdleWave();

  await new Promise(r => setTimeout(r, 300));

  const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
  await processRecording(blob, duration);
}

function updateTimer() {
  if (!recordingStartTime) return;
  const elapsed = Math.floor((Date.now() - recordingStartTime - totalPausedMs) / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  document.getElementById('timer').textContent = `${m}:${s}`;
}

// ═══════════════════════════════════════════
// WAVEFORM
// ═══════════════════════════════════════════
function drawIdleWave() {
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = 'rgba(124,109,250,0.2)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  const mid = canvas.height / 2;
  for (let x = 0; x < canvas.width; x++) {
    const y = mid + Math.sin(x * 0.05) * 8;
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function drawLiveWave() {
  if (!analyser) return;
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw() {
    animFrameId = requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(dataArray);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
    gradient.addColorStop(0, '#7c6dfa');
    gradient.addColorStop(0.5, '#fa6d8a');
    gradient.addColorStop(1, '#6dfacc');

    ctx.strokeStyle = gradient;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    const sliceWidth = canvas.width / bufferLength;
    let x = 0;
    for (let i = 0; i < bufferLength; i++) {
      const v = dataArray[i] / 128.0;
      const y = v * canvas.height / 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      x += sliceWidth;
    }
    ctx.stroke();
  }
  draw();
}

// ═══════════════════════════════════════════
// GEMINI PROCESSING
// ═══════════════════════════════════════════
async function processRecording(blob, duration) {
  showProc('오디오 변환 중...', '파일을 준비하고 있어요');

  const apiKey = settings.apiKey;
  if (!apiKey) {
    hideProc();
    showToast('API 키를 설정에서 입력해주세요');
    saveRecordingBasic(blob, duration, null);
    return;
  }

  try {
    // Convert blob to base64
    const base64 = await blobToBase64(blob);
    const base64Data = base64.split(',')[1];
    const mimeType = blob.type || 'audio/webm';

    showProc('Gemini 분석 중...', '화자 분리 및 전사 중');

    const langNames = { ko: '한국어', en: 'English', ja: '日本語', zh: '中文' };
    const langName = langNames[settings.lang] || '한국어';

    let promptParts = `이 오디오 파일을 분석해주세요. 언어: ${langName}\n\n`;

    if (settings.diarize) {
      promptParts += `1. 화자 분리(Speaker Diarization): 각 화자를 "화자1", "화자2" 등으로 구분하여 대화를 전사해주세요.\n`;
    } else {
      promptParts += `1. 전체 내용을 텍스트로 전사해주세요.\n`;
    }

    if (settings.summary) promptParts += `2. 전체 내용을 3-5문장으로 요약해주세요.\n`;
    if (settings.keywords) promptParts += `3. 핵심 키워드 5-8개를 추출해주세요.\n`;

    promptParts += `\n반드시 다음 JSON 형식으로만 응답해주세요 (다른 텍스트 없이):
{
  "title": "내용을 잘 나타내는 제목 (20자 이내)",
  "transcript": [
    {"speaker": "화자1", "text": "발화 내용"},
    {"speaker": "화자2", "text": "발화 내용"}
  ],
  "summary": "요약 내용",
  "keywords": ["키워드1", "키워드2", "키워드3"]
}`;

    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${settings.model}:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { inlineData: { mimeType, data: base64Data } },
            { text: promptParts }
          ]
        }],
        generationConfig: { temperature: 0.2, maxOutputTokens: 4096 }
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API 오류');
    }

    showProc('결과 처리 중...', '거의 다 됐어요');

    const data = await response.json();
    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

    let parsed = null;
    try {
      const jsonMatch = rawText.match(/\{[\s\S]*\}/);
      if (jsonMatch) parsed = JSON.parse(jsonMatch[0]);
    } catch (e) {}

    saveRecordingBasic(blob, duration, parsed);
    hideProc();
    showToast('✅ 분석 완료!');
    document.getElementById('statusTag').textContent = '탭하여 녹음 시작';

  } catch (err) {
    console.error(err);
    hideProc();
    showToast('분석 실패: ' + err.message.slice(0, 30));
    saveRecordingBasic(blob, duration, null);
  }
}

async function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result);
    reader.onerror = rej;
    reader.readAsDataURL(blob);
  });
}

function saveRecordingBasic(blob, duration, aiResult) {
  const id = Date.now().toString();
  const now = new Date();
  const blobUrl = URL.createObjectURL(blob);

  const rec = {
    id,
    date: now.toISOString(),
    duration,
    title: aiResult?.title || `녹음 ${now.toLocaleDateString('ko-KR')}`,
    summary: aiResult?.summary || '',
    keywords: aiResult?.keywords || [],
    transcript: aiResult?.transcript || [],
    blobUrl,
    mimeType: blob.type
  };

  // store blob as base64 for persistence
  blobToBase64(blob).then(b64 => {
    rec.audioData = b64;
    recordings.unshift(rec);
    saveRecordings();
    renderList();
  });
}

// ═══════════════════════════════════════════
// LIST & DETAIL
// ═══════════════════════════════════════════
function renderList() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const el = document.getElementById('recordingList');

  const filtered = recordings.filter(r => {
    if (!q) return true;
    return r.title.toLowerCase().includes(q) ||
      r.summary.toLowerCase().includes(q) ||
      r.keywords.some(k => k.toLowerCase().includes(q)) ||
      r.transcript.some(t => t.text.toLowerCase().includes(q));
  });

  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🎙️</div>
      <div class="empty-label">${q ? '검색 결과 없음' : '아직 녹음이 없어요'}</div>
      <div class="empty-sub">${q ? '다른 키워드로 검색해보세요' : 'REC 탭에서 녹음을 시작하세요'}</div>
    </div>`;
    return;
  }

  el.innerHTML = filtered.map(r => {
    const d = new Date(r.date);
    const dateStr = d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
    const timeStr = d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    const dur = formatDuration(r.duration);
    const speakers = [...new Set(r.transcript.map(t => t.speaker))].length;

    return `<div class="recording-card" onclick="openDetail('${r.id}')">
      <div class="card-top">
        <div class="card-title">${escHtml(r.title)}</div>
        <div class="card-date">${dateStr} ${timeStr}</div>
      </div>
      ${r.summary ? `<div class="card-summary">${escHtml(r.summary)}</div>` : ''}
      <div class="card-tags">
        <span class="tag tag-duration">⏱ ${dur}</span>
        ${speakers > 1 ? `<span class="tag tag-speakers">👥 ${speakers}명</span>` : ''}
        ${!r.summary && !r.transcript.length ? `<span class="tag tag-processing">분석 전</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function openDetail(id) {
  const rec = recordings.find(r => r.id === id);
  if (!rec) return;
  currentDetailId = id;

  document.getElementById('detailTitle').textContent = rec.title;
  const d = new Date(rec.date);
  document.getElementById('detailMeta').textContent =
    `${d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' })} · ${d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })} · ${formatDuration(rec.duration)}`;

  // Audio
  const player = document.getElementById('audioPlayer');
  if (rec.audioData) {
    player.src = rec.audioData;
  } else if (rec.blobUrl) {
    player.src = rec.blobUrl;
  }
  document.getElementById('audioFill').style.width = '0%';
  document.getElementById('playBtn').textContent = '▶';

  // Summary
  const sumWrap = document.getElementById('detailSummaryWrap');
  if (rec.summary) {
    sumWrap.style.display = 'block';
    document.getElementById('detailSummary').textContent = rec.summary;
  } else {
    sumWrap.style.display = 'none';
  }

  // Keywords
  const kwWrap = document.getElementById('detailKeywordsWrap');
  if (rec.keywords?.length) {
    kwWrap.style.display = 'block';
    document.getElementById('detailKeywords').innerHTML = rec.keywords.map(k => `<span class="keyword">${escHtml(k)}</span>`).join('');
  } else {
    kwWrap.style.display = 'none';
  }

  // Transcript
  const speakerColors = ['speaker-1', 'speaker-2', 'speaker-3', 'speaker-4'];
  const speakerMap = {};
  let colorIdx = 0;
  const transcriptEl = document.getElementById('detailTranscript');
  if (rec.transcript?.length) {
    transcriptEl.innerHTML = rec.transcript.map(block => {
      if (!speakerMap[block.speaker]) {
        speakerMap[block.speaker] = speakerColors[colorIdx++ % speakerColors.length];
      }
      return `<div class="speaker-block">
        <div class="speaker-name ${speakerMap[block.speaker]}">${escHtml(block.speaker)}</div>
        <div class="speaker-text">${escHtml(block.text)}</div>
      </div>`;
    }).join('');
  } else {
    transcriptEl.innerHTML = '<div style="color:var(--text3);font-size:14px;">전사 내용이 없습니다</div>';
  }

  // Show detail screen
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-detail').classList.add('active');
}

function backToList() {
  document.getElementById('audioPlayer').pause();
  document.getElementById('playBtn').textContent = '▶';
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-list').classList.add('active');
  document.querySelectorAll('.tab')[1].classList.add('active');
}

// ═══════════════════════════════════════════
// AUDIO PLAYER
// ═══════════════════════════════════════════
function togglePlay() {
  const player = document.getElementById('audioPlayer');
  if (player.paused) {
    player.play();
    document.getElementById('playBtn').textContent = '⏸';
  } else {
    player.pause();
    document.getElementById('playBtn').textContent = '▶';
  }
}

function onAudioProgress() {
  const player = document.getElementById('audioPlayer');
  if (!player.duration) return;
  const pct = (player.currentTime / player.duration) * 100;
  document.getElementById('audioFill').style.width = pct + '%';
  document.getElementById('audioTime').textContent = formatDuration(Math.floor(player.currentTime));
}

function onAudioEnded() {
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('audioFill').style.width = '0%';
}

function seekAudio(e) {
  const player = document.getElementById('audioPlayer');
  const bar = document.getElementById('audioProgress');
  const pct = e.offsetX / bar.offsetWidth;
  player.currentTime = pct * player.duration;
}

// ═══════════════════════════════════════════
// SHARE & DELETE
// ═══════════════════════════════════════════
function shareRecording() {
  const rec = recordings.find(r => r.id === currentDetailId);
  if (!rec) return;

  let text = `📼 ${rec.title}\n`;
  text += `📅 ${new Date(rec.date).toLocaleDateString('ko-KR')}\n`;
  text += `⏱ ${formatDuration(rec.duration)}\n\n`;
  if (rec.summary) text += `📝 요약\n${rec.summary}\n\n`;
  if (rec.keywords?.length) text += `🔑 키워드: ${rec.keywords.join(', ')}\n\n`;
  if (rec.transcript?.length) {
    text += `💬 대화 내용\n`;
    rec.transcript.forEach(t => text += `[${t.speaker}] ${t.text}\n`);
  }

  if (navigator.share) {
    navigator.share({ title: rec.title, text });
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('클립보드에 복사됐어요'));
  }
}

function deleteRecording() {
  if (!confirm('이 녹음을 삭제할까요?')) return;
  recordings = recordings.filter(r => r.id !== currentDetailId);
  saveRecordings();
  backToList();
  showToast('삭제됐어요');
}

function clearAll() {
  if (!confirm('모든 녹음을 삭제할까요? 복구할 수 없어요.')) return;
  recordings = [];
  saveRecordings();
  updateStorageInfo();
  showToast('모두 삭제됐어요');
}

// ═══════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════
function toggleSetting(key) {
  settings[key] = !settings[key];
  syncToggle(key);
  saveSettings();
}

function syncToggle(key) {
  const el = document.getElementById('toggle' + key.charAt(0).toUpperCase() + key.slice(1));
  if (el) el.classList.toggle('on', !!settings[key]);
}

function saveSettings() {
  settings.apiKey = document.getElementById('apiKeyInput')?.value || settings.apiKey;
  settings.model = document.getElementById('modelSelect')?.value || settings.model;
  settings.lang = document.getElementById('langSelect')?.value || settings.lang;
  localStorage.setItem('voiceai_settings', JSON.stringify(settings));
}

function updateStorageInfo() {
  const el = document.getElementById('storageInfo');
  if (el) el.textContent = `총 ${recordings.length}개의 녹음`;
}

function saveRecordings() {
  try {
    localStorage.setItem('voiceai_recordings', JSON.stringify(recordings));
  } catch (e) {
    showToast('저장 공간이 부족해요');
  }
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function formatDuration(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return m > 0 ? `${m}분 ${s}초` : `${s}초`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showProc(step, label) {
  document.getElementById('procStep').textContent = step;
  document.getElementById('procLabel').textContent = label;
  document.getElementById('procOverlay').classList.add('show');
}

function hideProc() {
  document.getElementById('procOverlay').classList.remove('show');
}

// ═══════════════════════════════════════════
// START
// ═══════════════════════════════════════════
init();
</script>
